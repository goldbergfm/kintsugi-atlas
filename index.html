        let activeWeek = 1;
        let currentFormat = 'book'; 
        let currentPalette = 'vanilla';

        function saveStore() {
            localStorage.setItem('kintsugi_atlas_store_v4', JSON.stringify(contentStore));
        }

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.pointerEvents = 'auto';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.pointerEvents = 'none';
            }, 3000);
        }

        function openConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        function executeReset() {
            localStorage.removeItem('kintsugi_atlas_store_v4');
            contentStore = JSON.parse(JSON.stringify(defaultContentData));
            renderLenta();
            closeConfirmModal();
            showToast("данные сброшены к оригиналу");
        }

        function copyDataBackup() {
            const dataStr = JSON.stringify(contentStore);
            const el = document.createElement('textarea');
            el.value = dataStr;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            showToast("код скопирован! отправь его мне");
        }

        function updateSlideField(slideIndex, field, value) {
            contentStore[activeWeek].slides[slideIndex][field] = value;
            saveStore();
        }

        function createCardHtml(slide, index) {
            const bgGradient = 'linear-gradient(rgba(15, 12, 10, 0.15), rgba(15, 12, 10, 0.42))';
            
            const cardHeightClass = currentFormat === 'square' ? 'h-[405px]' : 'h-[570px]';
            const imageHeightClass = currentFormat === 'square' ? 'h-[160px]' : 'h-[210px]';
            const contentHeightClass = currentFormat === 'square' ? 'h-[245px]' : 'h-[360px]';

            return `
                <article class="w-full max-w-[405px] ${cardHeightClass} rounded-2xl overflow-hidden shadow-xl flex flex-col justify-between relative border border-stone-200/40 shrink-0 mx-auto transition-all duration-300 card-theme">
                    
                    <div class="${imageHeightClass} w-full slide-bg relative overflow-hidden group" 
                         style="background-image:${bgGradient}, url('${slide.previewBg}');">
                        
                        <div class="absolute inset-x-4 bottom-4 no-print opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity duration-300 z-50">
                            <input 
                                type="text" 
                                value="${slide.previewBg}" 
                                oninput="updateSlideField(${index}, 'previewBg', this.value); this.closest('article').querySelector('.slide-bg').style.backgroundImage = 'linear-gradient(rgba(15, 12, 10, 0.15), rgba(15, 12, 10, 0.42)), url(\\'' + this.value + '\\')'"
                                class="w-full bg-black/70 border border-stone-800/80 text-stone-200 text-[10px] py-1.5 px-3 rounded-lg focus:outline-none focus:border-[#b89775] placeholder-stone-500 font-mono"
                                placeholder="вставьте URL-ссылку на photo..."
                            />
                        </div>
                    </div>
                    
                    <div class="${contentHeightClass} w-full p-7 flex flex-col justify-between content-theme">
                        <header class="flex justify-between items-center text-[9px] tracking-[0.3em] uppercase text-stone-400 font-medium no-print">
                            <div class="lowercase">${activeWeek === 1 ? 'чувства' : activeWeek === 2 ? 'анатомия' : 'исследование'}</div>
                            <div class="font-mono text-[#b89775] font-semibold">${slide.part}</div>
                        </header>
                        
                        <main class="my-auto">
                            <span 
                                contenteditable="true" 
                                onblur="updateSlideField(${index}, 'badge', this.innerText)"
                                class="text-[12px] font-semibold tracking-widest text-stone-400 uppercase block mb-1.5"
                            >${slide.badge}</span>
                            
                            <h2 
                                contenteditable="true" 
                                onblur="updateSlideField(${index}, 'title', this.innerText)"
                                class="title-font text-[28px] leading-[1.15] font-semibold tracking-tight mb-3.5 lowercase title-theme"
                            >${slide.title}</h2>
                            
                            <div class="w-full h-[1px] bg-stone-200/60 my-3.5 divider-theme"></div>
                            
                            <p 
                                contenteditable="true" 
                                onblur="updateSlideField(${index}, 'text', this.innerText)"
                                class="text-[14px] leading-[1.8] text-stone-600 font-light lowercase mb-4 text-theme"
                            >${slide.text}</p>
                            
                            <div class="flex items-stretch gap-3 mb-2.5">
                                <div class="w-[2px] bg-[#b89775] rounded-full"></div>
                                <p 
                                    contenteditable="true" 
                                    onblur="updateSlideField(${index}, 'question', this.innerText)"
                                    class="text-[15px] leading-relaxed font-medium lowercase question-theme"
                                >${slide.question}</p>
                            </div>
                        </main>
                        
                        <footer class="flex justify-between text-[9px] tracking-[0.2em] uppercase text-stone-400 border-t border-stone-200/60 pt-3 footer-border-theme no-print">
                            <div 
                                contenteditable="true" 
                                onblur="updateSlideField(${index}, 'footer', this.innerText)"
                                class="lowercase"
                            >${slide.footer}</div>
                            <div class="text-stone-400 font-medium">kintsugi*</div>
                        </footer>
                    </div>
                </article>
            `;
        }

        function renderLenta() {
            const currentList = contentStore[activeWeek].slides;
            const container = document.getElementById('slides-container');
            container.innerHTML = currentList.map((s, idx) => createCardHtml(s, idx)).join('');
            
            applyPaletteStyles();
        }

        function setFormat(format) {
            currentFormat = format;
            const bookBtn = document.getElementById('btn-fmt-book');
            const sqBtn = document.getElementById('btn-fmt-square');

            if (format === 'book') {
                bookBtn.className = "px-3 py-1.5 text-[9px] uppercase tracking-wider rounded-lg bg-stone-900 text-white font-semibold transition-all";
                sqBtn.className = "px-3 py-1.5 text-[9px] uppercase tracking-wider rounded-lg bg-stone-100 text-stone-600 border border-stone-200 transition-all";
            } else {
                bookBtn.className = "px-3 py-1.5 text-[9px] uppercase tracking-wider rounded-lg bg-stone-100 text-stone-600 border border-stone-200 transition-all";
                sqBtn.className = "px-3 py-1.5 text-[9px] uppercase tracking-wider rounded-lg bg-stone-900 text-white font-semibold transition-all";
            }
            renderLenta();
        }

        function setPalette(palette) {
            currentPalette = palette;
            
            ['vanilla', 'chocolate', 'sage'].forEach(p => {
                const dot = document.getElementById(`pal-${p}`);
                if (p === palette) {
                    dot.className = "w-6 h-6 rounded-full border-2 border-stone-800 color-dot transform scale-110";
                } else {
                    dot.className = "w-6 h-6 rounded-full border border-stone-300 color-dot";
                }
            });

            applyPaletteStyles();
        }

        function applyPaletteStyles() {
            const body = document.getElementById('body-root');
            const cards = document.querySelectorAll('.card-theme');
            const contents = document.querySelectorAll('.content-theme');
            const titles = document.querySelectorAll('.title-theme');
            const texts = document.querySelectorAll('.text-theme');
            const questions = document.querySelectorAll('.question-theme');
            const dividers = document.querySelectorAll('.divider-theme');
            const footers = document.querySelectorAll('.footer-border-theme');

            if (currentPalette === 'vanilla') {
                body.style.backgroundColor = '#f5ebe0';
                body.style.color = '#2d2a29';
                cards.forEach(c => c.style.backgroundColor = '#fffdfa');
                contents.forEach(c => c.style.backgroundColor = '#fffdfa');
                titles.forEach(t => t.style.color = '#2d2a29');
                texts.forEach(t => t.style.color = '#4a4745');
                questions.forEach(q => q.style.color = '#2d2a29');
                dividers.forEach(d => d.style.backgroundColor = 'rgba(0,0,0,0.06)');
                footers.forEach(f => f.style.borderTop = '1px solid rgba(0,0,0,0.06)');
            } else if (currentPalette === 'chocolate') {
                body.style.backgroundColor = '#1c140e';
                body.style.color = '#fdf8f5';
                cards.forEach(c => c.style.backgroundColor = '#261b14');
                contents.forEach(c => c.style.backgroundColor = '#261b14');
                titles.forEach(t => t.style.color = '#fdf8f5');
                texts.forEach(t => t.style.color = '#d9d0cb');
                questions.forEach(q => q.style.color = '#fdf8f5');
                dividers.forEach(d => d.style.backgroundColor = 'rgba(255,255,255,0.08)');
                footers.forEach(f => f.style.borderTop = '1px solid rgba(255,255,255,0.08)');
            } else if (currentPalette === 'sage') {
                body.style.backgroundColor = '#cfc5b4'; 
                body.style.color = '#2d2a29';
                cards.forEach(c => c.style.backgroundColor = '#f5f2eb');
                contents.forEach(c => c.style.backgroundColor = '#f5f2eb');
                titles.forEach(t => t.style.color = '#2d2a29');
                texts.forEach(t => t.style.color = '#4e4a46');
                questions.forEach(q => q.style.color = '#2d2a29');
                dividers.forEach(d => d.style.backgroundColor = 'rgba(0,0,0,0.06)');
                footers.forEach(f => f.style.borderTop = '1px solid rgba(0,0,0,0.06)');
            }
        }

        function setWeek(weekNum) {
            activeWeek = weekNum;
            
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById(`tab-week-${i}`);
                if (i === weekNum) {
                    btn.className = "py-2 text-[10px] tracking-widest font-semibold rounded-lg uppercase transition-all duration-300 bg-white text-stone-900 shadow-sm focus:outline-none";
                } else {
                    btn.className = "py-2 text-[10px] tracking-widest font-semibold rounded-lg uppercase transition-all duration-300 text-stone-500 hover:text-stone-800 focus:outline-none";
                }
            }

            document.getElementById('active-week-title').innerText = contentStore[activeWeek].title;
            document.getElementById('footer-week-badge').innerText = `неделя 0${activeWeek}`;
            
            renderLenta();
        }

        window.onload = function() {
            setWeek(1); 
        }
    </script>
</body>
</html>
