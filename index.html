<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kintsugi* – атлас безопасности</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@200;300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f5ebe0; 
            color: #2d2a29; 
            -webkit-tap-highlight-color: transparent;
        }
        .title-font { font-family: 'Instrument Sans', sans-serif; }
        .slide-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #pdf-loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45,42,41,0.6);
            backdrop-filter: blur(6px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
        }
        #pdf-loading.active { display: flex; }
        #pdf-loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #fdfcf7;
            font-weight: 500;
        }
        .pdf-spinner {
            width: 26px; height: 26px;
            border: 2px solid rgba(253,252,247,0.15);
            border-top-color: #b89775;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #pdf-render-target {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 405px;
            pointer-events: none;
            z-index: -1;
        }
        #pdf-render-target article {
            width: 405px !important;
            height: 570px !important;
            overflow: hidden;
        }

        @media print { body { display: none; } }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col gap-0 selection:bg-[#b89775]/20 selection:text-[#2d2a29]">

    <div id="pdf-loading">
        <div class="pdf-spinner"></div>
        <div id="pdf-loading-text">подготовка конспекта...</div>
    </div>

    <div id="pdf-render-target"></div>

    <!-- ШАПКА -->
    <header class="w-full max-w-[405px] mx-auto mb-10 flex flex-col items-center gap-5">

        <!-- Бренд -->
        <div class="text-center w-full flex flex-col items-center gap-1">
            <span class="text-[9px] tracking-[0.45em] uppercase text-stone-500 font-medium">рефлексия.fm · виктория голдберг</span>
            <h1 class="title-font text-[13px] tracking-[0.25em] uppercase text-stone-800 font-semibold mt-1">kintsugi<span class="text-[#b89775]">*</span> · атлас безопасности</h1>
            <p class="text-[10px] tracking-[0.2em] text-stone-400 uppercase font-light mt-0.5">тема месяца · безопасность</p>
        </div>

        <!-- Разделитель -->
        <div class="w-full h-[1px] bg-stone-300/50"></div>

        <!-- Табы недель -->
        <div class="flex w-full border-b border-stone-300/70" id="week-tabs"></div>

        <!-- Подзаголовок -->
        <div class="w-full text-center">
            <p id="week-subtitle" class="title-font text-[16px] text-stone-500 font-light italic tracking-tight lowercase"></p>
        </div>

        <!-- Кнопка PDF -->
        <button onclick="exportPDF()" 
            class="w-full py-3 text-[10px] tracking-widest uppercase rounded-xl bg-stone-900/8 border border-stone-300 text-stone-700 hover:bg-stone-900 hover:text-white hover:border-stone-900 transition-all duration-300 font-semibold focus:outline-none">
            скачать конспект · pdf
        </button>
    </header>

    <!-- ЛЕНТА КАРТОЧЕК -->
    <main class="flex-grow w-full max-w-[1200px] mx-auto flex flex-col items-center">
        <div id="slides-container" class="flex flex-col items-center gap-10 w-full"></div>
    </main>

    <!-- ФУТЕР -->
    <footer class="w-full max-w-[405px] mx-auto mt-14 flex flex-col items-center gap-4">
        <div class="w-full h-[1px] bg-stone-300/50"></div>
        <div class="flex justify-between items-center w-full px-1 text-[9px] tracking-[0.3em] uppercase text-stone-400">
            <div id="footer-week-label">неделя 01</div>
            <button onclick="exportPDF()" class="hover:text-stone-800 transition-colors duration-300 border-b border-stone-300/70 pb-px">скачать pdf</button>
            <div>kintsugi*</div>
        </div>
        <div class="text-[9px] text-stone-400 tracking-[0.25em] uppercase font-light">
            рефлексия.fm · виктория голдберг · 2026
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // ─── ДАННЫЕ ───────────────────────────────────────────────────────────────
        const weeks = [
            {
                id: "week1",
                label: "неделя 01",
                tabLabel: "чувства",
                subtitle: "тело знает первым",
                slides: [
                    {
                        part: "01", badge: "состояние",
                        title: "тело знает первым",
                        text: "живот в напряжении. в груди что-то сжалось. или горло — как будто что-то держит. причины ещё нет. а тело уже подаёт сигнал. я называю это фоном. не тревогой — именно фоном. когда он есть постоянно, перестаёшь замечать, что он вообще есть.",
                        question: "что прямо сейчас происходит у тебя внутри — если не объяснять, а заметить?",
                        footer: "фон становится нормой",
                        bg: "https://images.unsplash.com/photo-1723639904965-2ec88c2163fc?q=80&w=1770&auto=format&fit=crop"
                    },
                    {
                        part: "02", badge: "сигналы",
                        title: "она знает сигналы",
                        text: "температуру рук. частоту дыхания. есть ли рядом кто-то знакомый. можно ли выдохнуть до конца. она постоянно сканирует: здесь можно или нет. и всё, что мы называем тревогой, контролем, усталостью — часто это её ответ.",
                        question: "что тело считает безопасным у тебя?",
                        footer: "здесь можно или нет",
                        bg: "https://images.unsplash.com/photo-1494548162494-384bba4ab999?q=80&w=800"
                    },
                    {
                        part: "03", badge: "диагностика",
                        title: "живот в напряжении",
                        text: "всё спокойно. никакой явной угрозы снаружи нет. но внутри всё собрано в плотный узел. я долго думала, что это связано с ситуацией. потом заметила: живот реагирует раньше, чем я успеваю включить голову. это самая честная зона — здесь нет костной защиты.",
                        question: "положи руку на живот. какой он сейчас — удерживает или движется с дыханием?",
                        footer: "тело знает раньше",
                        bg: "https://images.unsplash.com/photo-1772744874693-c86b6dd87af7?q=80&w=1770&auto=format&fit=crop"
                    },
                    {
                        part: "04", badge: "резонанс",
                        title: "внутренняя скорость меньше",
                        text: "не потому что они делают что-то особенное. что-то считывается ещё до слов — и живот отпускает. дыхание становится свободнее. тело словно перестаёт ждать. мы привыкли объяснять это характером.",
                        question: "рядом с кем твоё дыхание становится свободнее ещё до начала разговора?",
                        footer: "тело считывает иначе",
                        bg: "https://images.unsplash.com/photo-1534198730876-4bcab78c52f4?w=800&auto=format&fit=crop"
                    },
                    {
                        part: "05", badge: "наблюдение",
                        title: "оба варианта честные",
                        text: "какие-то сигналы дошли до внимания, какие-то так и остались фоном. в какие моменты этой недели твоё тело само становилось спокойнее? что происходило вокруг в этот момент? что изменилось первым — ситуация или состояние тела?",
                        question: "что изменилось первым — ситуация или напряжение в теле?",
                        footer: "что изменилось первым",
                        bg: "https://images.unsplash.com/photo-1574708760360-280362d9de33?w=800&auto=format&fit=crop"
                    },
                    {
                        part: "06", badge: "внимание",
                        title: "верить вниманию",
                        text: "можно не менять темп, не пытаться дышать правильно. обратить внимание, как рёбра расходятся на вдохе и опадают на выдохе. твоя нервная система прямо сейчас считывает этот бережный жест внимания.",
                        question: "можно побыть с этими ощущениями столько, сколько захочется.",
                        footer: "присутствие достаточно",
                        bg: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=800"
                    },
                    {
                        part: "07", badge: "интеграция",
                        title: "не снаружи. внутри",
                        text: "нервная система всё время что-то решает. без нашего участия. раньше, чем мы успеваем это заметить. первое изменение редко начинается с исчезновения напряжения. чаще — с момента, когда впервые замечаешь его вовремя.",
                        question: "что ты увидела о себе на этой неделе?",
                        footer: "заметить — уже достаточно",
                        bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800"
                    }
                ]
            }
            // Неделя 2 добавляется сюда:
            // { id: "week2", label: "неделя 02", tabLabel: "анатомия", subtitle: "анатомия · каркас и фасции", slides: [...] }
        ];

        let activeWeekIndex = 0;

        // ─── РЕНДЕР ТАБОВ ─────────────────────────────────────────────────────────
        function renderTabs() {
            const container = document.getElementById('week-tabs');
            container.innerHTML = weeks.map((w, i) => `
                <button onclick="setWeek(${i})" 
                    class="flex-1 text-center text-[10px] tracking-widest pb-2.5 border-b-2 transition-all duration-300 focus:outline-none uppercase font-semibold
                    ${i === activeWeekIndex 
                        ? 'border-stone-800 text-stone-900' 
                        : 'border-transparent text-stone-400 hover:text-stone-700'}">
                    ${w.tabLabel}
                </button>
            `).join('');
            document.getElementById('week-subtitle').textContent = weeks[activeWeekIndex].subtitle;
            document.getElementById('footer-week-label').textContent = weeks[activeWeekIndex].label;
        }

        // ─── КАРТОЧКА ─────────────────────────────────────────────────────────────
        function createCardHtml(slide) {
            const grad = 'linear-gradient(rgba(15,12,10,0.16),rgba(15,12,10,0.46))';
            return `
                <article class="w-full max-w-[405px] h-[570px] rounded-2xl overflow-hidden shadow-2xl flex flex-col bg-[#fdfcf7] border border-stone-200/40 shrink-0">
                    <div class="h-[210px] w-full shrink-0 slide-bg"
                         style="background-image:${grad}, url('${slide.bg}');"></div>
                    <div class="flex-1 w-full px-7 pt-5 pb-5 flex flex-col justify-between bg-[#fdfcf7]">
                        <header class="flex justify-between items-center text-[9px] tracking-[0.3em] uppercase text-stone-400 font-medium">
                            <div class="lowercase">атлас безопасности</div>
                            <div class="font-mono text-[#b89775] font-semibold">${slide.part}</div>
                        </header>
                        <main class="flex flex-col justify-center flex-1 py-3">
                            <span class="text-[11px] font-semibold tracking-widest text-stone-400 uppercase block mb-1">${slide.badge}</span>
                            <h2 class="title-font text-[26px] text-[#2d2a29] leading-[1.1] font-semibold tracking-tight mb-3 lowercase">${slide.title}</h2>
                            <div class="w-full h-px bg-stone-200/60 mb-3"></div>
                            <p class="text-[13px] leading-[1.75] text-stone-500 font-light lowercase mb-4">${slide.text}</p>
                            <div class="flex items-stretch gap-3">
                                <div class="w-[2px] bg-[#b89775] rounded-full shrink-0"></div>
                                <p class="text-[14px] leading-relaxed text-[#2d2a29] font-medium lowercase">${slide.question}</p>
                            </div>
                        </main>
                        <footer class="flex justify-between text-[9px] tracking-[0.2em] uppercase text-stone-300 border-t border-stone-100 pt-3">
                            <div class="lowercase">${slide.footer}</div>
                            <div class="font-medium text-stone-400">kintsugi*</div>
                        </footer>
                    </div>
                </article>
            `;
        }

        // ─── РЕНДЕР ЛЕНТЫ ─────────────────────────────────────────────────────────
        function renderLenta() {
            const week = weeks[activeWeekIndex];
            document.getElementById('slides-container').innerHTML = 
                week.slides.map(s => createCardHtml(s)).join('');
            renderTabs();
        }

        function setWeek(i) {
            activeWeekIndex = i;
            renderLenta();
        }

        // ─── PDF ЭКСПОРТ ──────────────────────────────────────────────────────────
        async function exportPDF() {
            const week = weeks[activeWeekIndex];
            const loading = document.getElementById('pdf-loading');
            const loadingText = document.getElementById('pdf-loading-text');

            loading.classList.add('active');
            loadingText.textContent = 'загрузка шрифтов...';
            await document.fonts.ready;

            const target = document.getElementById('pdf-render-target');
            // Временно сохраняем activeWeekIndex для рендера карточек в target
            target.innerHTML = week.slides.map(s => createCardHtml(s)).join('');
            
            // Ждём картинки
            await new Promise(r => setTimeout(r, 1400));

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'px', format: [405, 570], orientation: 'portrait' });
            const slides = target.querySelectorAll('article');

            for (let i = 0; i < slides.length; i++) {
                loadingText.textContent = `карточка ${i + 1} из ${slides.length}...`;
                const canvas = await html2canvas(slides[i], {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#fdfcf7',
                    width: 405,
                    height: 570,
                    windowWidth: 405
                });
                if (i > 0) pdf.addPage([405, 570], 'portrait');
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.96), 'JPEG', 0, 0, 405, 570);
            }

            pdf.save(`kintsugi-атлас-${week.id}-конспект.pdf`);
            target.innerHTML = '';
            loading.classList.remove('active');
        }

        window.onload = () => renderLenta();
    </script>
</body>
</html>
